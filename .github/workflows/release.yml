name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart('v')
          echo "number=$ver" >> $env:GITHUB_OUTPUT

      - name: Publish app
        run: |
          dotnet publish -c Release -r win-x64 --no-self-contained `
            -p:PublishSingleFile=false `
            -p:DebugType=none -p:DebugSymbols=false `
            -o ./publish

      - name: Set MSIX version in manifest
        run: |
          $ver = "${{ steps.version.outputs.number }}"
          $parts = $ver.Split('.')
          while ($parts.Count -lt 4) { $parts += '0' }
          $fullVer = $parts -join '.'
          $content = [System.IO.File]::ReadAllText("Package.appxmanifest")
          # Only replace Version= inside the <Identity> element to avoid clobbering MinVersion/MaxVersionTested
          $content = [regex]::Replace($content, '(<Identity\b[^>]*\bVersion=")[^"]*(")', "`${1}$fullVer`${2}")
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText((Resolve-Path "Package.appxmanifest").Path, $content, $utf8NoBom)

      - name: Stage MSIX package
        run: |
          New-Item -ItemType Directory -Path ./msix-stage -Force
          Copy-Item -Recurse ./publish/* ./msix-stage/
          Copy-Item Package.appxmanifest ./msix-stage/AppxManifest.xml
          New-Item -ItemType Directory -Path ./msix-stage/Assets -Force
          Copy-Item Assets\*.png ./msix-stage/Assets/

      - name: Build MSIX
        run: |
          $sdk = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "makeappx.exe" |
                   Where-Object { $_.FullName -match 'x64' } |
                   Sort-Object FullName -Descending |
                   Select-Object -First 1 -ExpandProperty FullName
          & $sdk pack /d ./msix-stage /p WifiQrScanner.msix /nv

      - name: Sign MSIX
        run: |
          # Generate a self-signed cert matching the Store publisher identity.
          # Microsoft re-signs the package during certification — this cert is just
          # required to satisfy the MSIX signing requirement for upload.
          $publisher = "CN=607692FF-94E1-4964-80CA-A77E2F2FBCFF"
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject $publisher `
            -KeyUsage DigitalSignature `
            -FriendlyName "WifiQrScanner" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3","2.5.29.19={text}")
          $pwd = ConvertTo-SecureString -String "ci" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath sign.pfx -Password $pwd

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" |
                        Where-Object { $_.FullName -match 'x64' } |
                        Sort-Object FullName -Descending |
                        Select-Object -First 1 -ExpandProperty FullName
          & $signtool sign /fd SHA256 /f sign.pfx /p "ci" WifiQrScanner.msix
          Write-Host "Signed: $(Test-Path WifiQrScanner.msix)"

      - name: Zip release
        run: Compress-Archive -Path ./publish/* -DestinationPath ./WifiQrScanner.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WiFi QR Scanner ${{ github.ref_name }}
          body: |
            ## Install

            **Option 1 — One-liner (recommended)**
            Open PowerShell as Administrator and run:
            ````powershell
            irm https://raw.githubusercontent.com/${{ github.repository }}/main/install.ps1 | iex
            ````

            **Option 2 — Manual**
            Download `WifiQrScanner.zip`, extract anywhere, run `WifiQrScanner.exe`.

            **Option 3 — Microsoft Store**
            Coming soon.
          files: |
            WifiQrScanner.zip
            WifiQrScanner.msix
          draft: false
          prerelease: false
